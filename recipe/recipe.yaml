context:
  version: "5.0.3"

package:
  name: mesonlsp
  version: ${{ version }}

source:
  url: https://github.com/JCWasmx86/mesonlsp/archive/v${{ version }}.tar.gz
  sha256: 34496582b6d0e3fe0531530f305392269a0e9043196cf605c62b5ae5205c7831

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - git
    - meson
    - ninja
    - pkg-config
    - if: unix
      then: sed
  host:
    - libarchive
    - libcurl
    - if: osx
      then: fmt
    - lsprotocol
    - nlohmann_json
    - pkgconf
    - pygls
    - libuuid
    - zlib

tests:
  - script:
      - mesonlsp --help

about:
  license: GPL-3.0-or-later
  license_file: COPYING
  summary: An unofficial, unendorsed language server for meson written in C++
  homepage: https://github.com/JCWasmx86/mesonlsp
  repository: https://github.com/JCWasmx86/mesonlsp

extra:
  recipe-maintainers:
    - danielnachun
